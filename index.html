<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoseAmp</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/noise.css" />
  <link rel="stylesheet" href="styles/loseamp.css" />
  <link rel="stylesheet" href="styles/rooms.css" />
</head>
<body class="app-loading">

  <div id="title-screen" class="active">
    <div class="title-shell">
      <p class="title-kicker">an instrument for leaving</p>
      <h1 class="title-word">LoseAmp</h1>
      <p class="title-copy">Begin when you are ready. The quiet thing in the center will wake with you.</p>
      <div class="title-actions">
        <button id="title-start" type="button">begin</button>
        <a class="title-demo-link" href="./demo/">demo rig</a>
      </div>
    </div>
    <div class="title-noise" aria-hidden="true"></div>
  </div>

  <!-- Hub: The Loseamp -->
  <div id="hub" class="screen active">

    <header id="hub-header">
      <div id="room-doors">
        <!-- Door buttons injected by rooms/manager.js -->
      </div>
      <div id="inventory-bar">
        <!-- Collected items displayed here -->
      </div>
    </header>

    <main id="portal-area">
      <div class="portal-aura portal-aura-left" aria-hidden="true"></div>
      <div class="portal-aura portal-aura-right" aria-hidden="true"></div>
      <canvas id="loseamp-canvas"></canvas>
      <div id="mirror-portal" aria-hidden="true">
        <div class="mirror-portal-axis"></div>
        <div class="mirror-portal-core"></div>
        <div class="mirror-portal-rim"></div>
      </div>
    </main>

    <section id="control-panel">
      <div id="control-panel-resizer" role="separator" aria-orientation="horizontal" aria-label="resize control panel">
        <span class="control-panel-resizer-grip" aria-hidden="true"></span>
      </div>
      <div id="instruments-panel"></div>
      <div id="sequencer-panel"></div>
      <div id="effects-panel"></div>
      <div id="lights-panel"></div>
    </section>

  </div>

  <!-- Rooms -->
  <div id="room-bright"    class="screen room hidden"></div>
  <div id="room-still"     class="screen room hidden"></div>
  <div id="room-clock"     class="screen room hidden"></div>
  <div id="room-mirror"    class="screen room hidden"></div>
  <div id="room-threshold" class="screen room hidden"></div>

  <!-- Overlay -->
  <div id="overlay" class="hidden"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
